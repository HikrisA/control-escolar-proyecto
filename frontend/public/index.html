<!DOCTYPE html>
<html lang="es">
    <head>
        <title>DGAE</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../src/css/login.css">
    </head>
    <body>
        <div class="login-container">
            <h1>Bienvenido al DGAE</h1>
            <form id="login-form">
                <label for="email" id="email-label">
                    <input 
                        required 
                        id="user_email" 
                        type="email" 
                        placeholder="ejemplo@correo.com"
                        name="email">
                </label>
                <label for="password" id="password-label">
                    <input 
                        required 
                        id="password" 
                        type="password"
                        name="contrasena">
                </label>
                <label for="submit" id="submit-label">
                    <button type="submit">Ingresar</button>
                </label>
            </form>
        </div>
    </body>
</html>
